<html>
  <head>
    <title>Facebook Login</title>
  </head>
  <body>
    <!-- Write your code here -->
	  <!-- Left Section -->
	  <div class="section" id="left">
		  <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Facebook_Logo_%282015%29_light.svg" alt="Facebook logo">
		  <p>
			  Facebook helps you connect and share with the people in your life.
		  </p>
	  </div>

	  <!-- Right Section -->
	  <div class="section" id="right">
		  <form>
			  <input type="text" id="email" placeholder="Email address or phone number">
			  <input type="password" id="password" placeholder="Password">
			  <button type="submit">Log in</button>
			  <a href="#">Forgotten account?</a>
			  <button class="signup">Create new account</button>
		  </form>
		  
	  </div>
  </body>
</html>
